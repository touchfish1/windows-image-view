name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust (Windows)
        if: matrix.os == 'windows-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Rust (macOS)
        if: matrix.os == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ inputs.version }}"
            $tauriConf = "src-tauri/tauri.conf.json"
            (Get-Content $tauriConf) -replace '"version": ".*"', "`"version`": `"$ver`"" | Set-Content $tauriConf
            $cargoToml = "src-tauri/Cargo.toml"
            (Get-Content $cargoToml) -replace '^version = "\d+\.\d+\.\d+"', "version = `"$ver`"" | Set-Content $cargoToml
            "tag=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "display=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            $tag = "${{ github.ref_name }}"
            $ver = $tag -replace '^v', ''
            "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "display=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "app_version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Save version info
        shell: pwsh
        run: |
          @{ tag = "${{ steps.version.outputs.tag }}"; display = "${{ steps.version.outputs.display }}" } | ConvertTo-Json | Set-Content version.json

      - name: Upload version info
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: version.json

      - name: Install npm dependencies
        run: npm ci

      - name: Download PaddleOCR-json (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .\src-tauri\download-paddleocr.ps1

      - name: Prepare resources (macOS)
        if: matrix.os == 'macos-latest'
        run: mkdir -p src-tauri/paddleocr && touch src-tauri/paddleocr/.gitkeep

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Sign bundles
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "private.key"
          [System.IO.File]::WriteAllText($keyPath, $env:TAURI_SIGNING_PRIVATE_KEY)
          $bundles = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File | Where-Object { $_.Extension -in '.exe','.dmg','.msi' }
          foreach ($bundle in $bundles) {
            Write-Output "Signing: $($bundle.FullName)"
            npx tauri signer sign -k "$keyPath" "$($bundle.FullName)"
          }

      - name: Upload signatures
        uses: actions/upload-artifact@v4
        with:
          name: sigs-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**/*.sig

      - name: List built artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File | Select-Object FullName, Length

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Image Viewer ${{ steps.version.outputs.display }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          body: |
            ## Image Viewer ${{ steps.version.outputs.display }}

            Windows 图片查看器，支持多种图片格式、OCR 识别、幻灯片播放、批量处理等功能。

            ### ✨ 功能特性
            - 多格式支持：PNG、JPEG、BMP、GIF、WebP、TIFF、ICO、SVG
            - OCR 文字识别
            - EXIF 元数据查看
            - 幻灯片播放
            - 批量格式转换 & 批量重命名
            - 缩略图导航
            - 键盘快捷键 & 鼠标拖拽操作
            - 跨平台支持：Windows + macOS

            ### 安装说明
            - Windows：下载 `setup.exe` 运行安装
            - macOS：下载 `.dmg` 文件并拖入 Applications 文件夹

            ### 系统要求
            - Windows 10/11 64位
            - macOS 11+ (Big Sur)
            - WebView2 Runtime（Windows 10+ 已内置）
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg

  generate-update-json:
    needs: [build-and-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: version-info
          path: version-info

      - uses: actions/download-artifact@v4
        with:
          pattern: sigs-*
          merge-multiple: true

      - name: Generate latest.json
        id: generate
        shell: pwsh
        run: |
          $info = Get-Content version-info/version.json | ConvertFrom-Json
          $tag = $info.tag
          $version = $tag -replace '^v', ''
          $repo = "${{ github.repository }}"

          $platforms = @{}

          Get-ChildItem -Filter "*.sig" | ForEach-Object {
            $sig = Get-Content $_.FullName -Raw
            $sigFileName = $_.Name
            $installerName = $sigFileName -replace '\.sig$', ''

            if ($installerName -match 'x64-setup') {
              $platforms["windows-x86_64"] = @{
                signature = $sig
                url = "https://github.com/$repo/releases/download/$tag/$installerName"
              }
            } elseif ($installerName -match 'aarch64|arm64') {
              $platforms["darwin-aarch64"] = @{
                signature = $sig
                url = "https://github.com/$repo/releases/download/$tag/$installerName"
              }
            } else {
              $platforms["darwin-x86_64"] = @{
                signature = $sig
                url = "https://github.com/$repo/releases/download/$tag/$installerName"
              }
            }
          }

          $json = @{
            version = $version
            notes = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = $platforms
          }

          $json | ConvertTo-Json -Depth 10 | Set-Content latest.json
          Get-Content latest.json
          Write-Output "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.generate.outputs.tag }}" latest.json --clobber
